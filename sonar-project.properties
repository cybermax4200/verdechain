sonar.projectKey=verdechain
sonar.projectName=VerdeChain
sonar.projectVersion=1.0.0
sonar.organization=verdechain
sonar.sources=api/src,frontend/src,sdk/src,cli/src,contracts
sonar.tests=api/test,frontend/__tests__,sdk/__tests__
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/.next/**
sonar.language=ts
sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.base.json
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.dto.ts,**/*.module.ts
sonar.cpd.exclusions=**/*.dto.ts,**/*.module.ts
