version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: verdechain-postgres-test
    restart: "no"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: verdechain
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: verdechain_test
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdechain"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis-test:
    image: redis:7-alpine
    container_name: verdechain-redis-test
    restart: "no"
    ports:
      - "6380:6379"
    tmpfs: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
