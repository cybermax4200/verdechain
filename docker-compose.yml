version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: verdechain-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: verdechain
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: verdechain_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U verdechain']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: verdechain-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  stellar:
    image: stellar/quickstart:soroban-dev-testnet
    container_name: verdechain-stellar
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      LOG_LEVEL: info
    volumes:
      - stellar-data:/opt/stellar
    command: ['--testnet', '--enable-soroban-rpc']

volumes:
  postgres-data:
  redis-data:
  stellar-data:
