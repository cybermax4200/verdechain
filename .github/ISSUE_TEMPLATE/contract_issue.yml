name: Smart Contract Issue
description: Report a bug, logic error, or security concern in a Soroban contract
labels: ["contracts", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **If this is a security vulnerability, do NOT open a public issue.**
        > Email **security@verdechain.io** instead. See [SECURITY.md](../../SECURITY.md).

  - type: dropdown
    id: contract
    attributes:
      label: Affected Contract
      options:
        - product_registry
        - lifecycle_tracker
        - attestation
        - greentag_cert
        - verifier_registry
        - carbon_oracle
        - shared (types / errors)
        - Multiple / unknown
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Logic error
        - Authorization bypass
        - Storage / state inconsistency
        - Event not emitted
        - Gas / resource inefficiency
        - Incorrect error code
        - Documentation mismatch
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue clearly, referencing the specific function(s) affected.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction (test case or steps)
      description: Provide a failing test or reproduction steps. Rust snippets are welcome.
      render: rust

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior

  - type: input
    id: soroban_version
    attributes:
      label: Soroban SDK Version
      placeholder: "21.x"
